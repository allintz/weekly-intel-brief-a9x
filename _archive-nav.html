<!-- ARCHIVE_NAV_START -->
<style>
#archive-nav-widget {
  position: fixed;
  top: 14px;
  right: 16px;
  z-index: 10000;
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 13px;
}
#archive-nav-widget button {
  background: rgba(24,24,27,0.92);
  color: #fafafa;
  border: 1px solid rgba(63,63,70,0.9);
  padding: 7px 12px;
  border-radius: 8px;
  cursor: pointer;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  font-family: inherit;
  font-size: inherit;
  font-weight: 500;
  line-height: 1;
  transition: background 120ms ease;
}
#archive-nav-widget button:hover { background: rgba(39,39,42,0.95); }
#archive-nav-widget.open .panel { display: block; }
#archive-nav-widget .panel {
  display: none;
  position: absolute;
  right: 0;
  top: 38px;
  background: #18181b;
  border: 1px solid #3f3f46;
  border-radius: 10px;
  padding: 6px;
  min-width: 220px;
  max-height: 60vh;
  overflow-y: auto;
  box-shadow: 0 12px 32px rgba(0,0,0,0.5);
}
#archive-nav-widget .panel a {
  display: block;
  padding: 8px 12px;
  color: #fafafa;
  text-decoration: none;
  border-radius: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  line-height: 1.3;
}
#archive-nav-widget .panel a:hover { background: #27272a; }
#archive-nav-widget .panel a.current { color: #a5b4fc; font-weight: 600; }
#archive-nav-widget .panel a.self { background: #27272a; outline: 1px solid #52525b; }
#archive-nav-widget .panel .hint {
  padding: 8px 12px 6px;
  color: #a1a1aa;
  font-size: 11px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  border-bottom: 1px solid #3f3f46;
  margin-bottom: 4px;
}
@media print { #archive-nav-widget { display: none; } }
</style>
<div id="archive-nav-widget" data-edition="__EDITION_DATE__">
  <button type="button" aria-label="Previous editions">Editions &#9662;</button>
  <div class="panel" role="menu">
    <div class="hint">Weekly Intelligence Brief</div>
    <div id="archive-nav-list">Loading&hellip;</div>
  </div>
</div>
<script>
(function() {
  var widget = document.getElementById('archive-nav-widget');
  var btn = widget.querySelector('button');
  var myEdition = widget.dataset.edition;
  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    widget.classList.toggle('open');
  });
  document.addEventListener('click', function(e) {
    if (!widget.contains(e.target)) widget.classList.remove('open');
  });
  fetch('/editions.json', { cache: 'no-cache' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var list = document.getElementById('archive-nav-list');
      list.innerHTML = '';
      if (!data.editions || !data.editions.length) {
        list.innerHTML = '<div class="hint">No editions yet</div>';
        return;
      }
      data.editions.forEach(function(e, idx) {
        var a = document.createElement('a');
        a.href = idx === 0 ? '/' : '/archive/' + e.date + '.html';
        a.textContent = e.date + (idx === 0 ? '  (current)' : '');
        if (idx === 0) a.classList.add('current');
        if (e.date === myEdition) a.classList.add('self');
        list.appendChild(a);
      });
    })
    .catch(function() {
      document.getElementById('archive-nav-list').innerHTML = '<div class="hint">Archive unavailable</div>';
    });
})();
</script>
<!-- ARCHIVE_NAV_END -->
